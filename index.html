<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ClosetSwipe</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --pink:#f05e86;
      --pink-dark:#eb4f7b;
      --dark:#1f1f1f;
      --muted:#7a7a7a;
      --bg:#fbfbfb;
      --border:rgba(0,0,0,.08);
      --shadow:0 14px 34px rgba(240,94,134,.18);
      --shadow-hover:0 16px 38px rgba(240,94,134,.32);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      background:var(--bg);
      font-family:Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      overflow:hidden;
    }

    /* Nav */
    .top-nav{
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:20;
      padding:22px 32px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:#fff;
      border-bottom:1px solid var(--border);
    }

    .top-nav a{
      text-decoration:none;
      line-height:1;
    }

    .brand{
      font-family:'Playfair Display', serif;
      font-size:18px;
      font-weight:800;
      color:var(--dark);
      letter-spacing:-0.02em;
    }

    .brand .swipe{ color:var(--pink); }

    .privacy{
      font-family:Inter, system-ui, sans-serif;
      font-size:16px;
      font-weight:800;
      color:var(--pink);
      letter-spacing:-0.01em;
    }

    .brand:hover,
    .privacy:hover{
      opacity:.78;
    }

    /* Background circles */
    .circle{
      position:fixed;
      border-radius:50%;
      background:rgba(240,94,134,0.14);
      pointer-events:none;
      z-index:0;
    }

    .circle.one{
      width:480px;
      height:480px;
      top:-140px;
      left:-140px;
    }

    .circle.two{
      width:560px;
      height:560px;
      bottom:-220px;
      right:-160px;
    }

    .circle.three{
      width:260px;
      height:260px;
      top:18%;
      right:9%;
      opacity:.08;
    }

    /* Main */
    .wrap{
      position:relative;
      z-index:2;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:110px 24px 40px;
    }

    .hero{
      max-width:1100px;
      width:100%;
    }

    h1{
      margin:0;
      font-family:'Playfair Display', serif;
      font-size:clamp(72px, 10vw, 148px);
      line-height:.95;
      font-weight:800;
      letter-spacing:-0.045em;
      color:var(--dark);
    }

    .pink{
      color:var(--pink);
    }

    .tagline{
      margin:20px 0 0;
      font-size:clamp(18px, 2vw, 24px);
      line-height:1.4;
      color:var(--muted);
      font-weight:500;
      letter-spacing:-0.01em;
    }

    .button-row{
      margin-top:38px;
      display:flex;
      gap:20px;
      justify-content:center;
      align-items:center;
      flex-wrap:wrap;
    }

    .store-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:14px;
      min-width:340px;
      padding:20px 28px;
      border-radius:22px;
      background:#fff;
      color:#111;
      border:2px solid transparent;
      text-decoration:none;
      font-size:18px;
      font-weight:700;
      box-shadow:0 8px 20px rgba(0,0,0,.06);
      transition:
        background .2s ease,
        color .2s ease,
        transform .18s ease,
        box-shadow .2s ease;
    }

    .store-btn svg{
      width:28px;
      height:28px;
      fill:currentColor;
      flex:0 0 auto;
      transition:fill .2s ease;
    }

    .store-btn:hover{
      background:var(--pink);
      color:#fff;
      transform:translateY(-2px);
      box-shadow:var(--shadow-hover);
    }

    .store-btn:active{
      transform:translateY(0);
    }

    @media (max-width: 768px){
      html,body{
        overflow:auto;
      }

      .top-nav{
        padding:18px 20px;
      }

      .brand{
        font-size:16px;
      }

      .privacy{
        font-size:15px;
      }

      .wrap{
        padding:120px 18px 50px;
      }

      .tagline{
        max-width:320px;
        margin-left:auto;
        margin-right:auto;
      }

      .store-btn{
        min-width:min(100%, 360px);
        width:100%;
        font-size:17px;
        padding:18px 22px;
      }

      .button-row{
        gap:14px;
      }
    }
  </style>
</head>
<body>

  <nav class="top-nav" aria-label="Primary navigation">
    <a class="brand" href="./index.html">Closet<span class="swipe">Swipe</span></a>
    <a class="privacy" href="./privacy.html">Privacy</a>
  </nav>

  <div class="circle one"></div>
  <div class="circle two"></div>
  <div class="circle three"></div>

  <main class="wrap">
    <section class="hero">
      <h1>Closet<span class="pink">Swipe</span></h1>
      <p class="tagline">swipe pre-loved fashion you'll obsess over</p>

      <div class="button-row">
        <a href="#" class="store-btn" aria-label="Download on the App Store">
          <!-- Apple icon -->
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M16.37 12.27c.03 3.15 2.76 4.2 2.79 4.21-.02.07-.43 1.49-1.42 2.95-.86 1.26-1.75 2.52-3.15 2.55-1.38.03-1.82-.82-3.4-.82-1.58 0-2.07.8-3.37.85-1.35.05-2.38-1.35-3.24-2.6-1.77-2.56-3.12-7.24-1.3-10.4.9-1.57 2.51-2.56 4.26-2.59 1.33-.03 2.58.9 3.39.9.81 0 2.33-1.12 3.93-.96.67.03 2.56.27 3.77 2.05-.1.06-2.25 1.31-2.26 3.86Zm-2.11-8.64c.72-.87 1.21-2.09 1.08-3.3-1.04.04-2.3.69-3.05 1.56-.67.77-1.25 2.01-1.09 3.19 1.16.09 2.35-.59 3.06-1.45Z"/>
          </svg>
          <span>Download on App Store</span>
        </a>

        <a href="#" class="store-btn" aria-label="Get it on Google Play">
          <!-- Google Play icon -->
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3.61 2.23 14.8 13.42 3.67 24c-.3-.16-.49-.48-.49-.9V3.13c0-.4.16-.72.43-.9Zm12 12 2.66 2.66c.76.43 1.56.31 2.43-.18l2.15-1.22c1.53-.87 1.53-2.29 0-3.16l-2.17-1.23c-.87-.49-1.67-.61-2.42-.18l-2.65 2.41Zm-.81-.81L3.61 2.23c.09-.01.18 0 .27.05l13.1 7.45-2.18 3.69Zm2.17.81 2.18 3.69-13.07 7.43c-.11.06-.21.08-.31.07l11.2-11.19Z"/>
          </svg>
          <span>Get it on Google Play</span>
        </a>
      </div>
    </section>
  </main>

</body>
</html>
