<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ClosetSwipe</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --pink:#f05e86;
      --dark:#1f1f1f;
      --muted:#7d7d7d;
      --bg:#fbfbfb;
      --border:rgba(0,0,0,.08);
      --tag-border:rgba(240,94,134,.18);
      --tag-bg:rgba(255,255,255,.96);
      --tag-shadow:0 12px 30px rgba(240,94,134,.10);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      background:var(--bg);
      overflow:hidden;
    }

    body{
      font-family:Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      position:relative;
    }

    .top-nav{
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:30;
      padding:22px 38px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:#fff;
      border-bottom:1px solid var(--border);
    }

    .top-nav a{
      text-decoration:none;
      line-height:1;
    }

    .brand{
      font-family:'Playfair Display', serif;
      font-size:18px;
      font-weight:800;
      color:var(--dark);
      letter-spacing:-0.02em;
    }

    .brand .swipe{ color:var(--pink); }

    .privacy{
      font-size:16px;
      font-weight:800;
      color:var(--pink);
      letter-spacing:-0.01em;
    }

    .brand:hover,
    .privacy:hover{
      opacity:.78;
    }

    .circle{
      position:fixed;
      border-radius:50%;
      background:rgba(240,94,134,0.14);
      pointer-events:none;
      z-index:0;
    }

    .circle.one{
      width:560px;
      height:560px;
      top:-170px;
      left:-160px;
    }

    .circle.two{
      width:720px;
      height:720px;
      bottom:-330px;
      right:-250px;
    }

    .circle.three{
      width:300px;
      height:300px;
      top:18%;
      right:12%;
      opacity:.06;
    }

    .wrap{
      position:relative;
      z-index:2;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:110px 24px 40px;
    }

    .hero{
      position:relative;
      width:min(1280px, 100%);
      max-width:1280px;
      min-height:560px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      isolation:isolate;
    }

    h1{
      margin:0;
      font-family:'Playfair Display', serif;
      font-size:clamp(90px, 10vw, 178px);
      line-height:.92;
      font-weight:800;
      letter-spacing:-0.05em;
      color:var(--dark);
      position:relative;
      z-index:4;
    }

    .pink{
      color:var(--pink);
    }

    .tagline{
      margin:18px 0 0;
      font-size:clamp(24px, 2vw, 34px);
      line-height:1.3;
      color:var(--muted);
      font-weight:500;
      letter-spacing:-0.02em;
      position:relative;
      z-index:4;
    }

    .button-row{
      margin-top:44px;
      display:flex;
      gap:24px;
      justify-content:center;
      align-items:center;
      flex-wrap:wrap;
      position:relative;
      z-index:4;
    }

    .store-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:16px;
      min-width:400px;
      padding:26px 34px;
      border-radius:24px;
      background:#fff;
      color:#111;
      text-decoration:none;
      font-size:20px;
      font-weight:700;
      box-shadow:0 12px 28px rgba(0,0,0,.04);
      transition:background .22s ease,color .22s ease,transform .16s ease,box-shadow .22s ease;
      position:relative;
      z-index:4;
    }

    .store-btn svg{
      width:34px;
      height:34px;
      fill:currentColor;
      flex:0 0 auto;
    }

    .store-btn:hover{
      background:var(--pink);
      color:#fff;
      transform:translateY(-2px);
      box-shadow:0 16px 34px rgba(240,94,134,.24);
    }

    .floating-tags{
      position:absolute;
      inset:0;
      z-index:1;
      pointer-events:none;
    }

    .floating-tag{
      position:absolute;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      white-space:nowrap;
      padding:12px 22px;
      border-radius:999px;
      background:var(--tag-bg);
      border:2px solid var(--tag-border);
      color:#cf5d82;
      font-weight:600;
      font-size:16px;
      letter-spacing:-0.01em;
      box-shadow:var(--tag-shadow);
      opacity:0;
      filter:blur(2px);
      transition:
        opacity 1.8s ease,
        transform 1.8s cubic-bezier(.22,1,.36,1),
        filter 1.8s ease;
      will-change:transform, opacity, filter;
    }

    .floating-tag.show{
      opacity:1;
      filter:blur(0);
    }

    .floating-tag.hide{
      opacity:0;
      filter:blur(2px);
    }

    @media (max-width: 1100px){
      .hero{
        min-height:600px;
      }

      .store-btn{
        min-width:330px;
      }
    }

    @media (max-width: 768px){
      html,body{
        overflow:auto;
      }

      .top-nav{
        padding:18px 20px;
      }

      .brand{font-size:16px}
      .privacy{font-size:15px}

      .wrap{
        padding:120px 18px 60px;
      }

      .hero{
        min-height:680px;
      }

      h1{
        font-size:clamp(62px, 16vw, 108px);
      }

      .tagline{
        font-size:clamp(18px, 5vw, 24px);
        max-width:320px;
      }

      .button-row{
        gap:14px;
        width:100%;
      }

      .store-btn{
        width:100%;
        min-width:0;
        max-width:380px;
        padding:20px 22px;
        font-size:18px;
      }

      .floating-tag{
        font-size:14px;
        padding:10px 18px;
      }
    }
  </style>
</head>
<body>

  <nav class="top-nav" aria-label="Primary navigation">
    <a class="brand" href="./index.html">Closet<span class="swipe">Swipe</span></a>
    <a class="privacy" href="./privacy.html">Privacy</a>
  </nav>

  <div class="circle one"></div>
  <div class="circle two"></div>
  <div class="circle three"></div>

  <main class="wrap">
    <section class="hero" id="hero">
      <div class="floating-tags" id="floatingTags" aria-hidden="true"></div>

      <h1>Closet<span class="pink">Swipe</span></h1>
      <p class="tagline">swipe pre-loved fashion you'll obsess over</p>

      <div class="button-row">
        <a href="#" class="store-btn" aria-label="Download on the App Store">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M16.37 12.27c.03 3.15 2.76 4.2 2.79 4.21-.02.07-.43 1.49-1.42 2.95-.86 1.26-1.75 2.52-3.15 2.55-1.38.03-1.82-.82-3.4-.82-1.58 0-2.07.8-3.37.85-1.35.05-2.38-1.35-3.24-2.6-1.77-2.56-3.12-7.24-1.3-10.4.9-1.57 2.51-2.56 4.26-2.59 1.33-.03 2.58.9 3.39.9.81 0 2.33-1.12 3.93-.96.67.03 2.56.27 3.77 2.05-.1.06-2.25 1.31-2.26 3.86Zm-2.11-8.64c.72-.87 1.21-2.09 1.08-3.3-1.04.04-2.3.69-3.05 1.56-.67.77-1.25 2.01-1.09 3.19 1.16.09 2.35-.59 3.06-1.45Z"/>
          </svg>
          <span>Download on App Store</span>
        </a>

        <a href="#" class="store-btn" aria-label="Get it on Google Play">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3.61 2.23 14.8 13.42 3.67 24c-.3-.16-.49-.48-.49-.9V3.13c0-.4.16-.72.43-.9Zm12 12 2.66 2.66c.76.43 1.56.31 2.43-.18l2.15-1.22c1.53-.87 1.53-2.29 0-3.16l-2.17-1.23c-.87-.49-1.67-.61-2.42-.18l-2.65 2.41Zm-.81-.81L3.61 2.23c.09-.01.18 0 .27.05l13.1 7.45-2.18 3.69Zm2.17.81 2.18 3.69-13.07 7.43c-.11.06-.21.08-.31.07l11.2-11.19Z"/>
          </svg>
          <span>Get it on Google Play</span>
        </a>
      </div>
    </section>
  </main>

  <script>
    const tags = [
      "Y2K",
      "Streetwear",
      "Vintage",
      "Indie Sleaze",
      "Skater",
      "Chic/Elegant",
      "Oversized",
      "High-waisted",
      "Baggy",
      "Minimalist",
      "Boho/Bohemian",
      "Preppy",
      "Grunge",
      "Cottagecore",
      "Clean Girl",
      "Soft Girl",
      "Designer/Luxury",
      "Wide leg",
      "Low-rise",
      "Retro"
    ];

    const container = document.getElementById("floatingTags");
    const activeZones = new Map();
    const recentTags = [];

    // One fixed outer area per corner only.
    // Deliberately far away from centre, text and buttons.
    const slotsDesktop = {
      tl: { x: 12, y: 16 },
      tr: { x: 88, y: 16 },
      bl: { x: 14, y: 82 },
      br: { x: 86, y: 82 }
    };

    const slotsMobile = {
      tl: { x: 18, y: 16 },
      tr: { x: 82, y: 20 },
      bl: { x: 18, y: 84 },
      br: { x: 82, y: 88 }
    };

    const zoneOrder = ["tl", "tr", "bl", "br"];

    function getSlots() {
      return window.innerWidth <= 768 ? slotsMobile : slotsDesktop;
    }

    function rememberTag(tag) {
      recentTags.push(tag);
      if (recentTags.length > 10) recentTags.shift();
    }

    function randomFrom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function getAvailableTag() {
      const inUse = new Set([...activeZones.values()].map(item => item.text));
      const recent = new Set(recentTags);

      let pool = tags.filter(tag => !inUse.has(tag) && !recent.has(tag));
      if (!pool.length) pool = tags.filter(tag => !inUse.has(tag));
      if (!pool.length) pool = tags;

      return randomFrom(pool);
    }

    function createTagEl(text, zone, slot) {
      const el = document.createElement("div");
      el.className = "floating-tag";
      el.textContent = text;

      const rotate = (Math.random() * 1.4 - 0.7).toFixed(2);
      const driftX = (Math.random() * 4 - 2).toFixed(1);
      const driftY = (Math.random() * 4 - 2).toFixed(1);

      el.style.left = `${slot.x}%`;
      el.style.top = `${slot.y}%`;

      let enterX = driftX;
      let exitX = driftX;

      if (zone === "tl" || zone === "bl") {
        enterX = Number(driftX) - 6;
        exitX = Number(driftX) - 3;
      } else {
        enterX = Number(driftX) + 6;
        exitX = Number(driftX) + 3;
      }

      el.dataset.rest = `translate(calc(-50% + ${driftX}px), calc(-50% + ${driftY}px)) rotate(${rotate}deg)`;
      el.dataset.enter = `translate(calc(-50% + ${enterX}px), calc(-50% + ${Number(driftY) + 4}px)) rotate(${rotate}deg) scale(.98)`;
      el.dataset.exit = `translate(calc(-50% + ${exitX}px), calc(-50% + ${Number(driftY) - 2}px)) rotate(${rotate}deg) scale(.985)`;

      el.style.transform = el.dataset.enter;
      return el;
    }

    function showZone(zone) {
      if (activeZones.has(zone)) return;

      const slots = getSlots();
      const slot = slots[zone];
      const text = getAvailableTag();
      const el = createTagEl(text, zone, slot);

      container.appendChild(el);
      activeZones.set(zone, { el, text });

      requestAnimationFrame(() => {
        el.classList.add("show");
        el.style.transform = el.dataset.rest;
      });

      rememberTag(text);

      const visibleFor = 5600 + Math.random() * 1800;

      setTimeout(() => {
        hideZone(zone);
      }, visibleFor);
    }

    function hideZone(zone) {
      const entry = activeZones.get(zone);
      if (!entry) return;

      const { el } = entry;
      activeZones.delete(zone);

      el.classList.remove("show");
      el.classList.add("hide");
      el.style.transform = el.dataset.exit;

      setTimeout(() => {
        el.remove();
      }, 1800);
    }

    function startFloatingTags() {
      // One per corner, staggered softly
      zoneOrder.forEach((zone, index) => {
        setTimeout(() => showZone(zone), index * 900);
      });

      // Keep exactly one in each corner over time
      setInterval(() => {
        zoneOrder.forEach((zone, index) => {
          if (!activeZones.has(zone)) {
            setTimeout(() => showZone(zone), index * 180);
          }
        });
      }, 1400);
    }

    let resizeTimeout;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        activeZones.forEach(({ el }) => el.remove());
        activeZones.clear();

        zoneOrder.forEach((zone, index) => {
          setTimeout(() => showZone(zone), index * 700);
        });
      }, 300);
    });

    startFloatingTags();
  </script>
</body>
</html>
