<!-- ======================
     index.html (UPDATED)
     - Nav bar: EXACT same as privacy page (white + fixed)
     - Tabs: same size/weight/spacing
     - ClosetSwipe in nav: Playfair Display (Swipe pink)
     - Privacy link: pink, goes to privacy.html
     - Landing content stays the same (centered brand + download button)
     ====================== -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ClosetSwipe</title>

  <!-- Fonts: Playfair (brand) + Inter (nav consistency if needed) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --pink:#f05e86;
      --dark:#1f1f1f;
      --border:rgba(0,0,0,.08);
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      height:100%;
      background:#fff;
      overflow:hidden;
      font-family:'Playfair Display', serif;
    }

    /* Fixed white nav (EXACT same style as privacy) */
    .top-nav{
      position:fixed;
      top:0; left:0; right:0;
      z-index:20;
      padding:22px 28px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:#ffffff;
      border-bottom:1px solid var(--border);
    }

    .top-nav a{
      font-size:16px;
      font-weight:800;
      letter-spacing:-0.01em;
      line-height:1;
      text-decoration:none;
    }

    .brand{
      font-family:'Playfair Display', serif;
      font-weight:800;
      color:var(--dark);
    }
    .brand .swipe{ color:var(--pink); }
    .brand:hover{ opacity:.75; }

    .privacy{
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--pink);
      font-weight:800;
    }
    .privacy:hover{ opacity:.75; }

    /* Background circles */
    .circle{
      position:absolute;
      border-radius:50%;
      background:rgba(240,94,134,0.18);
      filter:blur(2px);
    }
    .circle.one{width:420px;height:420px;top:-120px;left:-120px;}
    .circle.two{width:520px;height:520px;bottom:-180px;right:-180px;}
    .circle.three{width:260px;height:260px;top:15%;right:10%;opacity:0.12;}

    /* Center content */
    .wrap{
      position:relative;
      z-index:2;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:24px;
    }

    h1{
      font-size:clamp(48px,7vw,84px);
      margin:0 0 32px;
      font-weight:800;
      color:var(--dark);
      letter-spacing:-0.02em;
    }
    .pink{ color:var(--pink); }

    .btn{
      display:inline-block;
      padding:16px 42px;
      border-radius:999px;
      background:var(--pink);
      color:#fff;
      font-size:18px;
      font-weight:700;
      text-decoration:none;
      transition:transform .15s ease, box-shadow .15s ease;
      box-shadow:0 12px 30px rgba(240,94,134,.35);
    }
    .btn:hover{
      transform:translateY(-2px);
      box-shadow:0 18px 40px rgba(240,94,134,.45);
    }
    .btn:active{
      transform:translateY(0);
      box-shadow:0 10px 24px rgba(240,94,134,.35);
    }
  </style>
</head>
<body>

  <!-- Nav (matches privacy page) -->
  <nav class="top-nav" aria-label="Primary navigation">
    <a class="brand" href="./index.html">Closet<span class="swipe">Swipe</span></a>
    <a class="privacy" href="./privacy.html">Privacy</a>
  </nav>

  <!-- Background -->
  <div class="circle one"></div>
  <div class="circle two"></div>
  <div class="circle three"></div>

  <!-- Content -->
  <main class="wrap">
    <div>
      <h1>Closet<span class="pink">Swipe</span></h1>
      <a href="#" class="btn">Download now</a>
    </div>
  </main>

</body>
</html>
