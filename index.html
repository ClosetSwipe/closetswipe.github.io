<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>ClosetSwipe</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--pink:#f05e86;
--dark:#1f1f1f;
--muted:#7d7d7d;
--border:rgba(0,0,0,.08);
--tag-border:rgba(240,94,134,.2);
--tag-bg:rgba(255,255,255,.96);
--tag-shadow:0 12px 30px rgba(240,94,134,.12);
}

*{box-sizing:border-box}

html,body{
margin:0;
height:100%;
background:#fff;
overflow:hidden;
font-family:Inter,sans-serif;
}

/* NAV */

.top-nav{
position:fixed;
top:0;
left:0;
right:0;
z-index:50;
padding:22px 32px;
display:flex;
justify-content:space-between;
align-items:center;
background:#fff;
border-bottom:1px solid var(--border);
}

.brand{
font-family:'Playfair Display',serif;
font-weight:800;
font-size:18px;
color:var(--dark);
text-decoration:none;
}

.brand .swipe{color:var(--pink)}

.privacy{
font-weight:800;
color:var(--pink);
text-decoration:none;
}

/* BACKGROUND */

.circle{
position:fixed;
border-radius:50%;
background:rgba(240,94,134,0.14);
pointer-events:none;
}

.circle.one{
width:560px;
height:560px;
top:-180px;
left:-160px;
}

.circle.two{
width:720px;
height:720px;
bottom:-320px;
right:-260px;
}

/* HERO */

.wrap{
height:100%;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding-top:60px;
position:relative;
}

.hero{
position:relative;
width:1200px;
max-width:95%;
min-height:560px;
}

h1{
font-family:'Playfair Display',serif;
font-weight:800;
font-size:clamp(90px,10vw,180px);
letter-spacing:-.05em;
margin:0;
color:var(--dark);
position:relative;
z-index:3;
}

.pink{color:var(--pink)}

.tagline{
margin-top:12px;
font-size:26px;
color:var(--muted);
position:relative;
z-index:3;
}

.button-row{
margin-top:40px;
display:flex;
gap:24px;
justify-content:center;
flex-wrap:wrap;
position:relative;
z-index:3;
}

.store-btn{
background:white;
padding:26px 40px;
border-radius:22px;
font-weight:700;
font-size:20px;
box-shadow:0 12px 28px rgba(0,0,0,.05);
display:flex;
align-items:center;
gap:14px;
text-decoration:none;
color:#111;
transition:.2s;
}

.store-btn svg{
width:28px;
height:28px;
fill:currentColor;
}

.store-btn:hover{
background:var(--pink);
color:white;
transform:translateY(-2px);
box-shadow:0 18px 36px rgba(240,94,134,.25);
}

/* TAGS */

.floating-tags{
position:absolute;
inset:0;
pointer-events:none;
z-index:1;
}

.floating-tag{
position:absolute;
padding:12px 22px;
border-radius:999px;
background:var(--tag-bg);
border:2px solid var(--tag-border);
color:#cf5d82;
font-weight:600;
box-shadow:var(--tag-shadow);
opacity:0;
filter:blur(3px);
transform:translate(-50%,-50%) scale(.96);

transition:
left 2.6s cubic-bezier(.22,1,.36,1),
top 2.6s cubic-bezier(.22,1,.36,1),
opacity 1.2s ease,
filter 1.2s ease,
transform 1.2s ease;
}

.floating-tag.show{
opacity:1;
filter:blur(0);
transform:translate(-50%,-50%) scale(1);
}

.floating-tag.hide{
opacity:0;
filter:blur(3px);
transform:translate(-50%,calc(-50% - 4px)) scale(.97);
}

</style>
</head>

<body>

<nav class="top-nav">
<a class="brand" href="#">Closet<span class="swipe">Swipe</span></a>
<a class="privacy" href="#">Privacy</a>
</nav>

<div class="circle one"></div>
<div class="circle two"></div>

<main class="wrap">

<section class="hero">

<div id="floatingTags" class="floating-tags"></div>

<h1>Closet<span class="pink">Swipe</span></h1>

<p class="tagline">
swipe pre-loved fashion you'll obsess over
</p>

<div class="button-row">

<a href="#" class="store-btn">

<svg viewBox="0 0 24 24">

</svg>

Download on App Store

</a>

<a href="#" class="store-btn">

<svg viewBox="0 0 24 24">

</svg>

Get it on Google Play

</a>

</div>

</section>

</main>

<script>

/* TAG SYSTEM */

const tags=[
"Y2K","Streetwear","Vintage","Grunge","Minimalist","Oversized",
"Clean Girl","Soft Girl","Cottagecore","Designer/Luxury",
"Low-rise","Wide leg","Retro","Preppy","Boho","Skater"
]

const zones=[
{minX:4,maxX:22,minY:8,maxY:22},
{minX:78,maxX:96,minY:8,maxY:22},
{minX:4,maxX:22,minY:80,maxY:94},
{minX:78,maxX:96,minY:80,maxY:94}
]

const container=document.getElementById("floatingTags")
const active=[]

function rand(min,max){return Math.random()*(max-min)+min}
function random(arr){return arr[Math.floor(Math.random()*arr.length)]}

function overlaps(a,b){
return !(a.right<b.left||a.left>b.right||a.bottom<b.top||a.top>b.bottom)
}

function rect(x,y,w,h){
return{left:x-w/2,right:x+w/2,top:y-h/2,bottom:y+h/2}
}

function measure(text){
const el=document.createElement("div")
el.className="floating-tag"
el.innerText=text
el.style.visibility="hidden"
container.appendChild(el)
const r=el.getBoundingClientRect()
el.remove()
return{w:r.width,h:r.height}
}

function findPos(zone,size){

const c=container.getBoundingClientRect()

for(let i=0;i<40;i++){

const x=c.width*(rand(zone.minX,zone.maxX)/100)
const y=c.height*(rand(zone.minY,zone.maxY)/100)

const r=rect(x,y,size.w,size.h)

let bad=false

for(const t of active){
if(overlaps(r,t.rect)){bad=true;break}
}

if(!bad)return{x,y,rect:r}

}

return null
}

function spawn(){

if(active.length>6)return

const text=random(tags)
const zone=random(zones)

const size=measure(text)
const pos=findPos(zone,size)

if(!pos)return

const el=document.createElement("div")
el.className="floating-tag"
el.innerText=text

const c=container.getBoundingClientRect()

el.style.left=(pos.x/c.width*100)+"%"
el.style.top=(pos.y/c.height*100)+"%"

container.appendChild(el)

requestAnimationFrame(()=>el.classList.add("show"))

const tag={el,rect:pos.rect,zone,size}

active.push(tag)

setTimeout(()=>move(tag),2500+Math.random()*2000)
setTimeout(()=>remove(tag),6500+Math.random()*2000)

}

function move(tag){

const pos=findPos(tag.zone,tag.size)
if(!pos)return

const c=container.getBoundingClientRect()

tag.el.style.left=(pos.x/c.width*100)+"%"
tag.el.style.top=(pos.y/c.height*100)+"%"

tag.rect=pos.rect

setTimeout(()=>move(tag),3000+Math.random()*3000)

}

function remove(tag){

tag.el.classList.remove("show")
tag.el.classList.add("hide")

setTimeout(()=>{
tag.el.remove()
const i=active.indexOf(tag)
if(i>-1)active.splice(i,1)
},1200)

}

function loop(){
spawn()
setTimeout(loop,900+Math.random()*1200)
}

spawn()
setTimeout(spawn,600)
setTimeout(spawn,1200)

loop()

</script>

</body>
</html>
