<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ClosetSwipe</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--pink:#f05e86;
--dark:#1f1f1f;
--muted:#7d7d7d;
--bg:#fbfbfb;
--border:rgba(0,0,0,.08);
}

*{box-sizing:border-box}

html,body{
margin:0;
background:var(--bg);
overflow:hidden;
font-family:Inter, sans-serif;
}

.top-nav{
position:fixed;
top:0;
left:0;
right:0;
padding:22px 38px;
display:flex;
justify-content:space-between;
align-items:center;
background:#fff;
border-bottom:1px solid var(--border);
z-index:50;
}

.brand{
font-family:'Playfair Display',serif;
font-weight:800;
font-size:18px;
color:var(--dark);
text-decoration:none;
}

.brand .swipe{color:var(--pink)}

.privacy{
color:var(--pink);
font-weight:800;
text-decoration:none;
}

.circle{
position:fixed;
border-radius:50%;
background:rgba(240,94,134,0.14);
pointer-events:none;
z-index:0;
}

.circle.one{width:560px;height:560px;top:-170px;left:-160px;}
.circle.two{width:720px;height:720px;bottom:-330px;right:-250px;}
.circle.three{width:300px;height:300px;top:18%;right:12%;opacity:.06;}

.wrap{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding-top:100px;
position:relative;
z-index:2;
}

.hero{
position:relative;
max-width:1200px;
width:100%;
}

h1{
font-family:'Playfair Display',serif;
font-size:clamp(90px,10vw,170px);
margin:0;
font-weight:800;
letter-spacing:-0.04em;
color:var(--dark);
}

.pink{color:var(--pink)}

.tagline{
margin-top:18px;
font-size:26px;
color:var(--muted);
}

.button-row{
margin-top:40px;
display:flex;
gap:24px;
justify-content:center;
flex-wrap:wrap;
}

.store-btn{
display:flex;
align-items:center;
gap:12px;
background:white;
padding:24px 34px;
border-radius:24px;
font-size:20px;
font-weight:700;
text-decoration:none;
color:#111;
box-shadow:0 12px 28px rgba(0,0,0,.04);
transition:.2s;
}

.store-btn:hover{
background:var(--pink);
color:white;
transform:translateY(-2px);
box-shadow:0 16px 34px rgba(240,94,134,.24);
}

.floating-tags{
position:absolute;
inset:0;
pointer-events:none;
}

.floating-tag{
position:absolute;
padding:12px 22px;
border-radius:999px;
background:white;
border:2px solid rgba(240,94,134,.2);
color:#cf5d82;
font-weight:600;
box-shadow:0 12px 30px rgba(240,94,134,.12);
opacity:0;
transform:translateY(10px) scale(.95);
transition:.8s ease;
}

.floating-tag.show{
opacity:1;
transform:translateY(0) scale(1);
}

.floating-tag.hide{
opacity:0;
transform:translateY(-10px) scale(.95);
}

</style>
</head>

<body>

<nav class="top-nav">
<a class="brand" href="#">Closet<span class="swipe">Swipe</span></a>
<a class="privacy" href="#">Privacy</a>
</nav>

<div class="circle one"></div>
<div class="circle two"></div>
<div class="circle three"></div>

<main class="wrap">

<section class="hero">

<div class="floating-tags" id="tags"></div>

<h1>Closet<span class="pink">Swipe</span></h1>

<p class="tagline">swipe pre-loved fashion you'll obsess over</p>

<div class="button-row">

<a href="#" class="store-btn">Download on App Store</a>

<a href="#" class="store-btn">Get it on Google Play</a>

</div>

</section>

</main>

<script>

const tagsList = [
"Y2K","Streetwear","Vintage","Grunge","Oversized","Boho",
"Minimalist","Designer","Wide Leg","Low Rise","Skater",
"Clean Girl","Preppy","Baggy","Retro","Cottagecore"
]

/* positions pushed FAR from centre */

const slots = [

{side:"left",x:4,y:12},
{side:"left",x:6,y:30},
{side:"left",x:4,y:48},
{side:"left",x:6,y:66},
{side:"left",x:4,y:84},

{side:"right",x:94,y:12},
{side:"right",x:92,y:30},
{side:"right",x:94,y:48},
{side:"right",x:92,y:66},
{side:"right",x:94,y:84}

]

const container=document.getElementById("tags")

let active=[]

function random(arr){return arr[Math.floor(Math.random()*arr.length)]}

function spawn(){

if(active.length>=4)return

let free=slots.filter(s=>!active.find(a=>a.slot===s))

if(!free.length)return

let slot=random(free)

let tag=random(tagsList)

let el=document.createElement("div")
el.className="floating-tag"
el.innerText=tag
el.style.left=slot.x+"%"
el.style.top=slot.y+"%"

container.appendChild(el)

requestAnimationFrame(()=>el.classList.add("show"))

active.push({el,slot})

setTimeout(()=>remove(el),3500+Math.random()*2000)

}

function remove(el){

el.classList.remove("show")
el.classList.add("hide")

setTimeout(()=>{
el.remove()
active=active.filter(t=>t.el!==el)
},900)

}

setInterval(spawn,900)

spawn()
setTimeout(spawn,600)
setTimeout(spawn,1200)

</script>

</body>
</html>
