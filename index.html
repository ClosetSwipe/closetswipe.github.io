<html lang="en">

<title>ClosetSwipe</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root{
  --pink:#f05e86;
  --dark:#1f1f1f;
  --muted:#7d7d7d;
  --border:rgba(0,0,0,.08);
  --tag-border:rgba(240,94,134,.2);
  --tag-bg:rgba(255,255,255,.96);
  --tag-shadow:0 12px 30px rgba(240,94,134,.12);
}

*{box-sizing:border-box}

html,body{
  margin:0;
  height:100%;
  background:#fff;
  overflow:hidden;
  font-family:Inter,sans-serif;
}

/* NAV */

.top-nav{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:50;
  padding:22px 32px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#fff;
  border-bottom:1px solid var(--border);
}

.brand{
  font-family:'Playfair Display',serif;
  font-weight:800;
  font-size:18px;
  color:var(--dark);
  text-decoration:none;
}

.brand .swipe{color:var(--pink)}

.nav-links{
  display:flex;
  gap:28px;
}

.nav-links a{
  font-weight:800;
  color:var(--pink);
  text-decoration:none;
}

/* BACKGROUND */

.circle{
  position:fixed;
  border-radius:50%;
  background:rgba(240,94,134,0.14);
  pointer-events:none;
}

.circle.one{
  width:560px;
  height:560px;
  top:-180px;
  left:-160px;
}

.circle.two{
  width:720px;
  height:720px;
  bottom:-320px;
  right:-260px;
}

/* HERO */

.wrap{
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding-top:60px;
  position:relative;
}

.hero{
  position:relative;
  width:1200px;
  max-width:95%;
  min-height:560px;
}

h1{
  font-family:'Playfair Display',serif;
  font-weight:800;
  font-size:clamp(90px,10vw,180px);
  letter-spacing:-.05em;
  margin:0;
  color:var(--dark);
  position:relative;
  z-index:3;
}

.pink{color:var(--pink)}

.tagline{
  margin-top:12px;
  font-size:26px;
  color:var(--muted);
  position:relative;
  z-index:3;
}

.button-row{
  margin-top:40px;
  display:flex;
  gap:24px;
  justify-content:center;
  flex-wrap:wrap;
  position:relative;
  z-index:3;
}

.store-btn{
  background:white;
  padding:26px 40px;
  border-radius:22px;
  font-weight:700;
  font-size:20px;
  box-shadow:0 12px 28px rgba(0,0,0,.05);
  display:flex;
  align-items:center;
  gap:12px;
  text-decoration:none;
  color:#111;
  transition:.2s;
}

.store-btn svg{
  width:28px;
  height:28px;
  fill:currentColor;
}

.store-btn:hover{
  background:var(--pink);
  color:white;
  transform:translateY(-2px);
  box-shadow:0 18px 36px rgba(240,94,134,.25);
}

/* TAGS */

.floating-tags{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:1;
}

.floating-tag{
  position:absolute;
  padding:12px 22px;
  border-radius:999px;
  background:var(--tag-bg);
  border:2px solid var(--tag-border);
  color:#cf5d82;
  font-weight:600;
  box-shadow:var(--tag-shadow);
  opacity:0;
  filter:blur(3px);
  transform:translate(-50%,-50%) scale(.96);
  transition:
    left 2.6s cubic-bezier(.22,1,.36,1),
    top 2.6s cubic-bezier(.22,1,.36,1),
    opacity 1.2s ease,
    filter 1.2s ease,
    transform 1.2s ease;
}

.floating-tag.show{
  opacity:1;
  filter:blur(0);
  transform:translate(-50%,-50%) scale(1);
}

.floating-tag.hide{
  opacity:0;
  filter:blur(3px);
  transform:translate(-50%,calc(-50% - 4px)) scale(.97);
}

</style>
</head>

<nav class="top-nav">
