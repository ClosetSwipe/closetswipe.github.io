<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>ClosetSwipe</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--pink:#f05e86;
--dark:#1f1f1f;
--muted:#7d7d7d;
--border:rgba(0,0,0,.08);
}

*{box-sizing:border-box}

html,body{
margin:0;
height:100%;
background:#fff;
overflow:hidden;
font-family:Inter,sans-serif;
}

/* NAV */

.top-nav{
position:fixed;
top:0;
left:0;
right:0;
z-index:50;
padding:22px 32px;
display:flex;
justify-content:space-between;
align-items:center;
background:white;
border-bottom:1px solid var(--border);
}

.brand{
font-family:'Playfair Display',serif;
font-weight:800;
font-size:18px;
color:var(--dark);
text-decoration:none;
}

.brand .swipe{color:var(--pink)}

.privacy{
font-weight:800;
color:var(--pink);
text-decoration:none;
}

/* BACKGROUND CIRCLES */

.circle{
position:fixed;
border-radius:50%;
background:rgba(240,94,134,0.14);
pointer-events:none;
}

.circle.one{
width:560px;
height:560px;
top:-180px;
left:-160px;
}

.circle.two{
width:720px;
height:720px;
bottom:-320px;
right:-260px;
}

/* CENTER CONTENT */

.wrap{
height:100%;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding-top:60px;
position:relative;
}

.hero{
position:relative;
width:1200px;
}

h1{
font-family:'Playfair Display',serif;
font-weight:800;
font-size:150px;
letter-spacing:-0.04em;
margin:0;
color:var(--dark);
}

.pink{color:var(--pink)}

.tagline{
margin-top:12px;
font-size:26px;
color:var(--muted);
}

.button-row{
margin-top:40px;
display:flex;
gap:24px;
justify-content:center;
}

.store-btn{
background:white;
padding:26px 40px;
border-radius:22px;
font-weight:700;
font-size:20px;
box-shadow:0 12px 28px rgba(0,0,0,.05);
display:flex;
align-items:center;
gap:12px;
text-decoration:none;
color:#111;
transition:.2s;
}

.store-btn:hover{
background:var(--pink);
color:white;
transform:translateY(-2px);
box-shadow:0 18px 36px rgba(240,94,134,.25);
}

/* TAGS */

.floating-tags{
position:absolute;
inset:0;
pointer-events:none;
}

.floating-tag{
position:absolute;
padding:12px 22px;
border-radius:999px;
background:white;
border:2px solid rgba(240,94,134,.2);
color:#cf5d82;
font-weight:600;
box-shadow:0 12px 30px rgba(240,94,134,.12);
opacity:0;
transform:translate(-50%,-50%) scale(.96);
transition:
left 3s cubic-bezier(.22,1,.36,1),
top 3s cubic-bezier(.22,1,.36,1),
opacity 1.4s ease,
transform 1.4s ease;
}

.floating-tag.show{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}

.floating-tag.hide{
opacity:0;
transform:translate(-50%,calc(-50% - 6px)) scale(.96);
}

</style>
</head>

<body>

<nav class="top-nav">
<a class="brand" href="#">Closet<span class="swipe">Swipe</span></a>
<a class="privacy" href="#">Privacy</a>
</nav>

<div class="circle one"></div>
<div class="circle two"></div>

<main class="wrap">

<section class="hero">

<div id="floatingTags" class="floating-tags"></div>

<h1>Closet<span class="pink">Swipe</span></h1>
<p class="tagline">swipe pre-loved fashion you'll obsess over</p>

<div class="button-row">

<a class="store-btn"> Download on App Store</a>

<a class="store-btn">▶ Get it on Google Play</a>

</div>

</section>

</main>

<script>

/* TAG DATA */

const tags=[
"Y2K","Streetwear","Vintage","Grunge","Minimalist","Oversized",
"Clean Girl","Soft Girl","Cottagecore","Designer/Luxury",
"Low-rise","Wide leg","Retro","Preppy","Boho","Skater"
]

const container=document.getElementById("floatingTags")
const active=[]

/* SAFE CORNER ZONES */

const zones=[
{minX:4,maxX:22,minY:8,maxY:22},
{minX:78,maxX:96,minY:8,maxY:22},
{minX:4,maxX:22,minY:80,maxY:94},
{minX:78,maxX:96,minY:80,maxY:94}
]

/* UTILS */

function rand(min,max){return Math.random()*(max-min)+min}

function random(arr){return arr[Math.floor(Math.random()*arr.length)]}

/* COLLISION */

function overlaps(a,b){
return !(
a.right+18<=b.left||
a.left>=b.right+18||
a.bottom+18<=b.top||
a.top>=b.bottom+18
)
}

/* SPAWN */

function spawn(){

if(active.length>=6)return

let zone=random(zones)

let text=random(tags)

let el=document.createElement("div")
el.className="floating-tag"
el.innerText=text

container.appendChild(el)

let rect=el.getBoundingClientRect()

let tries=0
let placed=false

while(!placed&&tries<40){

let x=rand(zone.minX,zone.maxX)
let y=rand(zone.minY,zone.maxY)

el.style.left=x+"%"
el.style.top=y+"%"

let r=el.getBoundingClientRect()

let newRect={
left:r.left,
right:r.right,
top:r.top,
bottom:r.bottom
}

let collide=false

for(let t of active){
if(overlaps(newRect,t.rect)){
collide=true
break
}
}

if(!collide){

placed=true

active.push({
el,
rect:newRect,
zone
})

}

tries++
}

requestAnimationFrame(()=>el.classList.add("show"))

setTimeout(()=>remove(el),6500+Math.random()*3000)

scheduleMove(el)

}

/* MOVE */

function scheduleMove(el){

function move(){

let item=active.find(t=>t.el===el)
if(!item)return

let zone=item.zone

let x=rand(zone.minX,zone.maxX)
let y=rand(zone.minY,zone.maxY)

el.style.left=x+"%"
el.style.top=y+"%"

setTimeout(move,3500+Math.random()*2500)

}

setTimeout(move,3000)

}

/* REMOVE */

function remove(el){

let item=active.find(t=>t.el===el)

if(!item)return

el.classList.remove("show")
el.classList.add("hide")

setTimeout(()=>{
el.remove()
let i=active.indexOf(item)
if(i>-1)active.splice(i,1)
},1400)

}

/* LOOP */

function loop(){

spawn()

setTimeout(loop,900+Math.random()*1400)

}

spawn()
setTimeout(spawn,600)
setTimeout(spawn,1200)

loop()

</script>

</body>
</html>
